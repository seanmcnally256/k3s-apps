apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: www
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/seanmcnally256/k3s-apps
    targetRevision: HEAD
    path: www
  destination:
    server: https://kubernetes.default.svc
    namespace: www
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
